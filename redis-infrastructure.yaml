apiVersion: apps/v1
kind: Deployment
metadata:
  name: minipaas-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      infrastructure: redis
  template:
    metadata:
      labels:
        infrastructure: redis
    spec:
      containers:
      - name: redis
        image: redis:6.2-alpine
        ports:
        - containerPort: 6379